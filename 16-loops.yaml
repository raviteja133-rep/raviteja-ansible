- name: installing multiple applications
  hosts: local
  connection: local
  tasks:
    - name: installing multiple applications
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
      - { name: 'gcc' , state: 'present' }  
      - { name: 'git' , state: 'absent' }
      - { name: 'zip' , state: 'present' }
      - { name: 'nginx' , state: 'present' }