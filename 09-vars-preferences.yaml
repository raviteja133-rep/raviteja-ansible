- name: variables
  hosts: local
  connection: local
  vars:
    PROJECT: "SABRE"
    ENVIRONMENT: "Prod" 

  vars_files:
    - project.yaml

  vars_prompt:
    - name: Project
      prompt: What is your Project?
      private: false
    - name: Environment
      prompt: What is your Environment?
      private: false       

  tasks:
    - name: print the variables
      vars:
        PROJECT: "QBE" 
        ENVIRONMENT: "Dev"
      ansible.builtin.debug:
        msg: "Project is {{ PROJECT }} Environment is {{ ENVIRONMENT }}" 
