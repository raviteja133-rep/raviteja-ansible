- name: variables
  hosts: local
  connection: local
  vars:
    PROJECT: "SABRE"
    ENVIRONMENT: "Prod"

  tasks:
    - name: printing play variables
      ansible.builtin.debug:
        msg: "project is {{ PROJECT }} Environment is {{ ENVIRONMENT }}"

    - name: printing task variables
      vars:
        PROJECT: "QBE"
        ENVIRONMENT: "Test"
      ansible.builtin.debug:
        msg: "project is {{ PROJECT }} Environment is {{ ENVIRONMENT }}"      
